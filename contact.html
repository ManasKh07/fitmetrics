<h2 style="margin-top:0;color:var(--primary);">Contact Us</h2>

<p style="margin-bottom:25px;">If you have questions or suggestions, send us a message.</p>

<form id="contactForm" action="https://formspree.io/f/mdawawle" method="POST">

<div class="input-group">
<label>Your Name</label>
<input type="text" name="name" placeholder="e.g., John Doe" required>
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" name="email" placeholder="john@example.com" required>
</div>

<div class="input-group">
<label>Your Message</label>
<textarea name="message" rows="5" placeholder="How can we help you?" style="width:100%;padding:12px;border:1px solid #e5e7eb;border-radius:8px;"></textarea>
</div>

<button type="submit">Send Message</button>

</form>

<div id="formMessage" class="result"></div>

</div>
